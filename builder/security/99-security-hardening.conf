# TelcoChisel OS Kernel Security Hardening
# Hardens the OS against local and network exploitation

# 1. Prevent Symlink & Hardlink Spoofing Attacks
fs.protected_hardlinks = 1
fs.protected_symlinks = 1

# 2. Kernel Self-Protection / Address Space Layout Randomization (ASLR)
kernel.randomize_va_space = 2

# 3. Restrict kernel log access and symbol lookup for non-root users
kernel.dmesg_restrict = 1
kernel.kptr_restrict = 2

# 4. Disable ICMP Redirect Acceptance (Prevents MitM / route redirection attacks)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# 5. Disable IP Source Routing (Prevents spoofed packet routing)
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# 6. Enable TCP SYN Cookies (Protection against SYN flood DDoS attacks)
net.ipv4.tcp_syncookies = 1

# 7. Reverse Path Filtering — DISABLED (was enabled; see CLAUDE.md "Security
# posture" section for the full rationale). rp_filter=1 drops packets whose
# source address doesn't match the routing table's expected return path —
# exactly the packets this OS's own tools need to send/receive: SigPloit
# (SS7/GTP spoofing), Scapy crafted-source packets, yersinia/ettercap
# spoofing, rogue DHCP, and SDR/RAN interfaces (mon0, ogstun, UE/gNB TUN
# devices) whose traffic legitimately doesn't match a "normal" routing path.
# Enabling it silently broke exactly the workflows this distro ships tools
# for, with no error message — the packets were just dropped.
net.ipv4.conf.all.rp_filter = 0
net.ipv4.conf.default.rp_filter = 0

# 8. Log Martians (log packets with impossible/spoofed source addresses)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# 9. Ignore ICMP broadcasts (Mitigates Smurf DDoS attacks)
net.ipv4.icmp_echo_ignore_broadcasts = 1

# 10. Disable send redirects (Since this is a researcher node, it should not act as a router)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0
