---
# Bootloader configuration for the installed system.
#
# This module chroots into the freshly-installed target and runs grub-install.
# It relies on grub-pc-bin / grub-efi-amd64-bin / shim-signed /
# grub-efi-amd64-signed being present in the installed system's package set
# (see builder/scripts/lib/packages.sh PKGS_BASE) — this file does not install
# those packages itself, it only configures how Calamares invokes GRUB once
# they're present.
#
# efiBootLoader: "grub" makes Calamares call the distro's own grub-install
# rather than a Calamares-bundled bootloader. On Ubuntu, grub-install is
# patched to automatically install the signed shim (shimx64.efi + grubx64.efi)
# when shim-signed + grub-efi-amd64-signed are installed and Secure Boot is
# detected — there is no separate Calamares config key for the shim itself.
efiBootLoader:          "grub"
efiBootloaderId:        "ubuntu"

# Also populate the removable-media EFI fallback path (\EFI\BOOT\BOOTX64.EFI)
# in addition to the distro-specific \EFI\ubuntu\ path, for firmware that only
# checks the fallback location on first boot after install.
installEFIFallbackGrub: true
