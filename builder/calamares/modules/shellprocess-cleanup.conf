---
i18n:
  name: "Cleaning up live environment..."

dontChroot: false
timeout: 60
script:
  # Remove the casper boot hook that forces the kernel into live mode
  - "-rm -f /etc/initramfs-tools/conf.d/casper-boot"
  
  # Remove the live user from the installed system
  - "-userdel -r telcosec"
  - "-rm -f /etc/sudoers.d/telcosec"
  - "-rm -f /etc/polkit-1/localauthority/50-local.d/telcosec.pkla"
  
  # Clean up live user remnants from skel (so new users don't get the install icon)
  - "-rm -f /etc/skel/Desktop/install-telcosec.desktop"
  
  # Optional: remove auto-login overrides if any were copied
  - "-rm -f /etc/lightdm/lightdm.conf.d/autologin-telcosec.conf"
