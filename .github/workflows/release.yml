name: Build and Release TelcoChisel

on:
  push:
    tags: ['v*.*.*']
  schedule:
    - cron: '0 2 * * 0'   # weekly — Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'nightly'
        type: choice
        options:
          - nightly   # build + push to SF nightly/, update rolling pre-release
          - patch     # bump x.y.Z → x.y.Z+1, create versioned release
          - minor     # bump x.Y.z → x.Y+1.0, create versioned release
          - major     # bump X.y.z → X+1.0.0, create versioned release

concurrency:
  group: release
  cancel-in-progress: false   # never cancel a running build mid-way

env:
  ISO: TelcoChisel-live.iso
  SF_USER: rfs85
  SF_PROJECT: telcochisel
  SF_HOST: frs.sourceforge.net
  SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 240
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Determine version & release mode ────────────────────────────────────
      - name: Resolve Version
        id: version
        run: |
          RELEASE_TYPE="${{ inputs.release_type }}"
          # tag push always produces a versioned release, overriding the input
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            IS_NIGHTLY=false
          elif [[ -z "$RELEASE_TYPE" || "$RELEASE_TYPE" == "nightly" ]]; then
            VERSION="nightly-$(git rev-parse --short HEAD)"
            IS_NIGHTLY=true
          else
            # Auto-bump the latest semver tag.
            # NOTE: the tag is NOT created/pushed here — only the version
            # string is computed. Creating the tag this early meant a build
            # failure later left a dangling tag in the repo, and a re-run
            # would auto-bump AGAIN (skipping a version). The tag is created
            # by softprops/action-gh-release in the "Publish Versioned
            # GitHub Release" step below, which only runs after a successful
            # build — and that action creates the tag itself as part of
            # publishing, atomically, only on success.
            LATEST=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
            [[ -z "$LATEST" ]] && LATEST="v0.0.0"
            MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
            PATCH=$(echo "$LATEST" | cut -d. -f3)
            case "$RELEASE_TYPE" in
              major) VERSION="v$((MAJOR+1)).0.0" ;;
              minor) VERSION="v${MAJOR}.$((MINOR+1)).0" ;;
              patch) VERSION="v${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
            IS_NIGHTLY=false
          fi
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "is_nightly=$IS_NIGHTLY"   >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (nightly=$IS_NIGHTLY)"

      # ── Free disk space ──────────────────────────────────────────────────────
      - name: Free Disk Space
        run: |
          sudo rm -rf \
            /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/lib/jvm /usr/share/swift \
            /usr/local/lib/node_modules /opt/hostedtoolcache /imagegeneration
          sudo docker image prune -af || true
          df -h /

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            debootstrap squashfs-tools grub-pc-bin grub-efi-amd64-bin \
            shim-signed grub-efi-amd64-signed \
            xorriso mtools zstd apt-cacher-ng ccache rsync
          sudo ccache --max-size=4G

      - name: Configure apt-cacher-ng
        run: |
          sudo sed -i 's/^# PassThroughPattern:.*/PassThroughPattern: .*/' \
            /etc/apt-cacher-ng/acng.conf || true
          sudo systemctl restart apt-cacher-ng

      # Cache keys include github.run_id so the SAVE key is unique every run —
      # actions/cache keys are immutable, so a fixed content-hash key means
      # the first cache saved for that hash is never updated again (every
      # later "hit" restores the same stale cache and silently skips saving
      # a fresh one). restore-keys still lets us restore the most recent
      # cache matching the content-hash prefix, so growth is preserved.
      - name: Restore apt-cacher-ng cache
        uses: actions/cache@v4
        with:
          path: /var/cache/apt-cacher-ng
          key: acng-noble-${{ hashFiles('builder/scripts/00-install-all-packages.sh') }}-${{ github.run_id }}
          restore-keys: |
            acng-noble-${{ hashFiles('builder/scripts/00-install-all-packages.sh') }}-
            acng-noble-

      - name: Set apt-cacher-ng ownership
        run: |
          sudo mkdir -p /var/cache/apt-cacher-ng
          sudo chown -R apt-cacher-ng:apt-cacher-ng /var/cache/apt-cacher-ng || true

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /root/.ccache
          key: ccache-${{ hashFiles('builder/scripts/*.sh') }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ hashFiles('builder/scripts/*.sh') }}-
            ccache-

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Build ISO
        env:
          APT_PROXY: http://localhost:3142
          USE_CCACHE: "1"
          CCACHE_DIR: /root/.ccache
          SQUASHFS_LEVEL: "3"
          ISO_VERSION: ${{ steps.version.outputs.version }}
        run: sudo -E bash build-iso.sh

      # ── Post-build metadata ──────────────────────────────────────────────────
      - name: Generate Checksum & Metadata
        id: meta
        run: |
          SHA256=$(sha256sum "$ISO" | awk '{print $1}')
          SIZE=$(du -sh "$ISO" | cut -f1)
          printf '%s  %s\n' "$SHA256" "$ISO" > "${ISO}.sha256"

          # Collect commits since last stable tag for the changelog
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1 || true)
          if [[ -n "$LAST_TAG" ]]; then
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --oneline --no-decorate | head -30)
          else
            CHANGELOG=$(git log --oneline --no-decorate -20)
          fi
          # Store changelog as multiline output
          {
            echo "changelog<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "sha256=$SHA256"
            echo "size=$SIZE"
          } >> "$GITHUB_OUTPUT"

          echo "ISO: $SIZE | SHA256: $SHA256"

      # ── Artifact retention (safety net before publish steps) ─────────────────
      # Retains the ISO and sha256 for 7 days in case SourceForge/GH publish fails.
      # ISO is chunked at 1.9 GB to stay under GH's artifact file size limit.
      - name: Split ISO for artifact upload
        run: |
          mkdir -p /tmp/iso-chunks
          split -b 1900M "$ISO" /tmp/iso-chunks/TelcoChisel-live.iso.part
          cp "${ISO}.sha256" /tmp/iso-chunks/

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelcoChisel-${{ steps.version.outputs.version }}
          path: /tmp/iso-chunks/
          retention-days: 7
          if-no-files-found: error

      # ── GitHub Actions step summary ──────────────────────────────────────────
      - name: Build Summary
        run: |
          {
            echo "## TelcoChisel Build — ${{ steps.version.outputs.version }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Date** | ${{ steps.version.outputs.date }} |"
            echo "| **ISO Size** | ${{ steps.meta.outputs.size }} |"
            echo "| **SHA-256** | \`${{ steps.meta.outputs.sha256 }}\` |"
            echo "| **Nightly** | ${{ steps.version.outputs.is_nightly }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare Caches for Saving
        if: always()
        run: |
          sudo chown -R runner:docker /root/.ccache || true
          sudo chown -R runner:docker /var/cache/apt-cacher-ng || true

      - name: Generate Release README for SourceForge
        env:
          VERSION:  ${{ steps.version.outputs.version }}
          DATE:     ${{ steps.version.outputs.date }}
          SIZE:     ${{ steps.meta.outputs.size }}
          SHA256:   ${{ steps.meta.outputs.sha256 }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          cat << EOF > README.md
          # TelcoChisel $VERSION
          
          | Field | Value |
          |-------|-------|
          | **Build** | \`$VERSION\` |
          | **Date** | $DATE |
          | **ISO Size** | $SIZE |
          | **SHA-256** | \`$SHA256\` |
          
          ### ⬇ Download
          Download the \`.iso\` file directly from this directory. No extraction or reassembly is needed.
          
          > **Live boot credentials:** \`telcosec:telcosec\`
          
          ### Changes since last release
          \`\`\`text
          $CHANGELOG
          \`\`\`
          EOF

      # ── SourceForge FRS ──────────────────────────────────────────────────────
      # SourceForge is presented to users as the primary download host (see the
      # release notes below). If SF_SSH_KEY is absent every SF step below is
      # silently skipped (`if: env.SF_SSH_KEY != ''`) and the job still goes
      # green — surface that clearly in the job summary instead of a quiet no-op.
      - name: Warn if SourceForge publish will be skipped
        if: env.SF_SSH_KEY == ''
        run: |
          echo "### ⚠️ SourceForge publish SKIPPED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`SF_SSH_KEY\` secret is not set — this run will publish to GitHub Releases only. The release notes link to SourceForge as the primary download; that link will 404 for this build." >> "$GITHUB_STEP_SUMMARY"
          echo "::warning::SF_SSH_KEY secret is absent — SourceForge publish skipped for this run"

      - name: Setup SSH for SourceForge
        if: env.SF_SSH_KEY != ''
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SF_SSH_KEY" > ~/.ssh/sf_deploy
          chmod 600 ~/.ssh/sf_deploy
          ssh-keyscan -H "$SF_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # Orientation README at the Files root — someone landing on the SF
      # "Files" page via a bookmark or search result (not the direct-download
      # link) otherwise sees a bare folder listing (nightly/, v1.0.0/, ...)
      # with no explanation. Refreshed every run; a plain rsync overwrite is
      # fine here (unlike the multi-GB ISO, a brief inconsistency in a few
      # hundred bytes of text is harmless).
      - name: Generate & Upload SourceForge Files-root README
        if: env.SF_SSH_KEY != ''
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
        run: |
          SF_ROOT="/home/frs/project/$SF_PROJECT"
          SF_SSH="ssh -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR"

          cat << 'EOF' > sf-root-README.md
          # TelcoChisel

          Advanced Telecom Security OS by TelcoSec — a live Linux ISO for 4G/5G
          mobile network auditing, SDR engineering, and cellular baseband research.

          ### Folder guide
          - **`nightly/`** — rolling pre-release build, updated weekly. May be less
            stable; intended for testing the latest fixes.
          - **`vX.Y.Z/`** — stable tagged releases. Pick the highest version number
            for the latest stable ISO.

          ### Quick links
          - **Direct download (always the current stable release):**
            https://sourceforge.net/projects/telcochisel/files/latest/download
          - **Documentation:** https://tschisel.telcosec.net
          - **Source code & issues:** https://github.com/TelcoSec-Tools/TelcoChiselOS

          > **Live boot credentials:** `telcosec:telcosec`
          EOF

          echo "-mkdir $SF_ROOT" > sftp_root_batch
          sftp -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR -b sftp_root_batch "$SF_USER@$SF_HOST"

          rsync -av -e "$SF_SSH" \
            sf-root-README.md \
            "$SF_USER@$SF_HOST:$SF_ROOT/README.md"
          echo "✓ SF root README → https://sourceforge.net/projects/$SF_PROJECT/files/"

      - name: Deploy to SourceForge — Nightly
        if: env.SF_SSH_KEY != '' && steps.version.outputs.is_nightly == 'true'
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
          VERSION:    ${{ steps.version.outputs.version }}
        run: |
          SF_DIR="/home/frs/project/$SF_PROJECT/nightly"
          SF_TMP="$SF_DIR/.upload-tmp"
          SF_SSH="ssh -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR"

          # SourceForge's restricted shell blocks arbitrary SSH commands like 'mkdir',
          # but allows 'mkdir' via sftp. Create the directory via an sftp batch script.
          echo "-mkdir $SF_DIR" > sftp_batch
          echo "-mkdir $SF_TMP" >> sftp_batch
          sftp -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR -b sftp_batch "$SF_USER@$SF_HOST"

          # Upload into a private staging subdir first — a network blip or
          # runner timeout mid-transfer never touches the public path, so
          # nobody can download a partial/corrupt ISO mid-upload.
          rsync -avP --partial \
            -e "$SF_SSH" \
            "$ISO" "${ISO}.sha256" "README.md" \
            "$SF_USER@$SF_HOST:$SF_TMP/"

          # Publish: back up whatever's currently public (non-fatal — nothing
          # to back up on the very first upload), promote the newly uploaded
          # files into place, then clean up. If promotion fails partway, the
          # ".old" backups let a human manually restore the previous good
          # files instead of the public path serving nothing.
          cat > sftp_publish << SFTPEOF
          -rename $SF_DIR/$ISO $SF_DIR/$ISO.old
          -rename $SF_DIR/${ISO}.sha256 $SF_DIR/${ISO}.sha256.old
          -rename $SF_DIR/README.md $SF_DIR/README.md.old
          rename $SF_TMP/$ISO $SF_DIR/$ISO
          rename $SF_TMP/${ISO}.sha256 $SF_DIR/${ISO}.sha256
          rename $SF_TMP/README.md $SF_DIR/README.md
          -rm $SF_DIR/$ISO.old
          -rm $SF_DIR/${ISO}.sha256.old
          -rm $SF_DIR/README.md.old
          -rmdir $SF_TMP
          SFTPEOF
          sftp -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR -b sftp_publish "$SF_USER@$SF_HOST"
          echo "✓ SF nightly → https://sourceforge.net/projects/$SF_PROJECT/files/nightly/"

      - name: Deploy to SourceForge — Versioned Release
        if: env.SF_SSH_KEY != '' && steps.version.outputs.is_nightly == 'false'
        env:
          SF_SSH_KEY: ${{ secrets.SF_SSH_KEY }}
          VERSION:    ${{ steps.version.outputs.version }}
        run: |
          SF_DIR="/home/frs/project/$SF_PROJECT/$VERSION"
          SF_TMP="$SF_DIR/.upload-tmp"
          SF_SSH="ssh -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR"

          # SourceForge's restricted shell blocks arbitrary SSH commands like 'mkdir',
          # but allows 'mkdir' via sftp. Create the directory via an sftp batch script.
          echo "-mkdir $SF_DIR" > sftp_batch
          echo "-mkdir $SF_TMP" >> sftp_batch
          sftp -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR -b sftp_batch "$SF_USER@$SF_HOST"

          # Upload into a private staging subdir first — a network blip or
          # runner timeout mid-transfer never touches the public path, so
          # nobody can download a partial/corrupt ISO mid-upload.
          rsync -avP --partial \
            -e "$SF_SSH" \
            "$ISO" "${ISO}.sha256" "README.md" \
            "$SF_USER@$SF_HOST:$SF_TMP/"

          # Publish: back up whatever's currently public (non-fatal — nothing
          # to back up on the very first upload of this version), promote the
          # newly uploaded files into place, then clean up. If promotion fails
          # partway, the ".old" backups let a human manually restore the
          # previous good files instead of the public path serving nothing.
          cat > sftp_publish << SFTPEOF
          -rename $SF_DIR/$ISO $SF_DIR/$ISO.old
          -rename $SF_DIR/${ISO}.sha256 $SF_DIR/${ISO}.sha256.old
          -rename $SF_DIR/README.md $SF_DIR/README.md.old
          rename $SF_TMP/$ISO $SF_DIR/$ISO
          rename $SF_TMP/${ISO}.sha256 $SF_DIR/${ISO}.sha256
          rename $SF_TMP/README.md $SF_DIR/README.md
          -rm $SF_DIR/$ISO.old
          -rm $SF_DIR/${ISO}.sha256.old
          -rm $SF_DIR/README.md.old
          -rmdir $SF_TMP
          SFTPEOF
          sftp -i ~/.ssh/sf_deploy -o BatchMode=yes -o LogLevel=ERROR -b sftp_publish "$SF_USER@$SF_HOST"
          echo "✓ SF versioned → https://sourceforge.net/projects/$SF_PROJECT/files/$VERSION/"

      # ── GitHub Releases ──────────────────────────────────────────────────────
      - name: Split ISO for GitHub Release
        run: |
          split -b 1900M "$ISO" "${ISO}.part-"
          ls -lh "${ISO}.part-"*

      - name: Publish Nightly GitHub Release
        if: steps.version.outputs.is_nightly == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION:  ${{ steps.version.outputs.version }}
          DATE:     ${{ steps.version.outputs.date }}
          SIZE:     ${{ steps.meta.outputs.size }}
          SHA256:   ${{ steps.meta.outputs.sha256 }}
          CHANGELOG: ${{ steps.meta.outputs.changelog }}
        run: |
          NOTES=$(cat << EOF
          ## TelcoChisel — Nightly Build

          | Field | Value |
          |-------|-------|
          | **Build** | \`${VERSION}\` |
          | **Date** | ${DATE} |
          | **ISO Size** | ${SIZE} |
          | **SHA-256** | \`${SHA256}\` |

          ### ⬇ Download (single file — no reassembly needed)
          **[SourceForge →](https://sourceforge.net/projects/telcochisel/files/nightly/)**
          Direct download, no size limit, resumable.

          ### Download from GitHub (split parts)
          Download all \`.part-*\` files and the \`.sha256\` file, then:
          \`\`\`bash
          cat TelcoChisel-live.iso.part-* > TelcoChisel-live.iso
          sha256sum -c TelcoChisel-live.iso.sha256
          \`\`\`

          ### Changes since last release
          \`\`\`
          ${CHANGELOG}
          \`\`\`

          > **Live boot credentials:** \`telcosec:telcosec\`
          EOF
          )
          # Never delete-then-create: if `create` failed after a `delete`,
          # there would be NO nightly release at all until the next run.
          # Instead: force-move the "nightly" tag to the current commit (a
          # single atomic ref update — the tag is never briefly absent),
          # then edit-in-place if the release exists, or create it only if
          # it doesn't. At every point in time a valid nightly release exists.
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git tag -f nightly
          git push origin nightly --force

          if gh release view nightly >/dev/null 2>&1; then
            gh release edit nightly \
              --prerelease \
              --title "Nightly — ${DATE}" \
              --notes "$NOTES"
            gh release upload nightly \
              ${ISO}.part-* "${ISO}.sha256" \
              --clobber
          else
            gh release create nightly \
              ${ISO}.part-* "${ISO}.sha256" \
              --prerelease \
              --title "Nightly — ${DATE}" \
              --notes "$NOTES"
          fi

      - name: Publish Versioned GitHub Release
        if: steps.version.outputs.is_nightly == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "TelcoChisel ${{ steps.version.outputs.version }}"
          make_latest: true
          generate_release_notes: true
          body: |
            | Field | Value |
            |-------|-------|
            | **ISO Size** | ${{ steps.meta.outputs.size }} |
            | **Built** | ${{ steps.version.outputs.date }} |
            | **SHA-256** | `${{ steps.meta.outputs.sha256 }}` |

            ### ⬇ Download (single file — no reassembly needed)
            **[SourceForge →](https://sourceforge.net/projects/telcochisel/files/${{ steps.version.outputs.version }}/)**
            Direct download, no size limit, resumable.

            ### Download from GitHub (split parts)
            Download all `.part-*` files and the `.sha256` file, then:
            ```bash
            cat TelcoChisel-live.iso.part-* > TelcoChisel-live.iso
            sha256sum -c TelcoChisel-live.iso.sha256
            ```

            > **Live boot credentials:** `telcosec:telcosec`
          files: |
            ${{ env.ISO }}.part-*
            ${{ env.ISO }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
